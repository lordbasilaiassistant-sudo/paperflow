name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests (pytest)
        run: pytest -q

  eval-subset:
    # Runs the real 10-doc extraction eval. Needs an OpenAI-compatible key in the
    # LLM_API_KEY repo secret; skips cleanly on forks that don't have one set.
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps (tesseract)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate 10 fixtures
        run: python -m evals.generate --n 10
      - name: Run 10-doc eval (skips if no key)
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.z.ai/api/paas/v4' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'glm-4.5-flash' }}
          LLM_EXTRA_BODY: '{"thinking": {"type": "disabled"}}'
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "LLM_API_KEY not set — skipping the eval step (expected on forks)."
            exit 0
          fi
          python -m evals.run --subset 10 --workers 2
